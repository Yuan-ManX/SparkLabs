<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SparkLabs - AI-Native Game Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000000;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow-x: hidden;
    }
    .gradient-text {
      background: linear-gradient(135deg, #f97316 0%, #ef4444 50%, #fbbf24 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .glow-orange { box-shadow: 0 0 80px rgba(249, 115, 22, 0.15); }
    .text-glow { text-shadow: 0 0 40px rgba(249, 115, 22, 0.3); }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }
    .animate-float { animation: float 6s ease-in-out infinite; }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }
    .animate-pulse-glow { animation: pulse-glow 4s ease-in-out infinite; }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-up { animation: slide-up 0.8s ease-out forwards; }
    .delay-100 { animation-delay: 0.1s; }
    .delay-150 { animation-delay: 0.15s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }
    .delay-400 { animation-delay: 0.4s; }
    .hover-lift {
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .hover-lift:hover {
      transform: translateY(-8px);
      box-shadow: 0 30px 60px rgba(249, 115, 22, 0.1);
    }
    .grid-bg {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .waitlist-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }
    .waitlist-input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(249, 115, 22, 0.5);
      outline: none;
    }
    .feature-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .feature-card:hover {
      background: linear-gradient(135deg, rgba(249,115,22,0.08) 0%, rgba(239,68,68,0.04) 100%);
      border-color: rgba(249, 115, 22, 0.2);
      transform: translateY(-4px);
    }
    /* SparkLabs Game HUD Overlay Styles */
    .game-window-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
      opacity: 1;
      background: rgba(0,0,0,0.3);
    }
    .game-hud-top {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .game-hud-bottom {
      position: absolute;
      bottom: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .hud-panel {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(249, 115, 22, 0.3);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 10px;
      font-family: 'Inter', monospace;
      color: rgba(255, 255, 255, 0.7);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .hud-bar {
      width: 40px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .hud-bar-fill {
      width: 75%;
      height: 100%;
      background: linear-gradient(90deg, #f97316, #ef4444);
      border-radius: 2px;
      animation: hudBarPulse 2s ease-in-out infinite;
    }
    .crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      pointer-events: none;
    }
    .crosshair::before,
    .crosshair::after {
      content: '';
      position: absolute;
      background: rgba(249, 115, 22, 0.6);
    }
    .crosshair::before {
      width: 1px;
      height: 100%;
      left: 50%;
      transform: translateX(-50%);
    }
    .crosshair::after {
      width: 100%;
      height: 1px;
      top: 50%;
      transform: translateY(-50%);
    }
    .crosshair-dot {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(249, 115, 22, 0.9);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: crosshairPulse 1.5s ease-in-out infinite;
    }
    .minimap {
      position: absolute;
      bottom: 40px;
      right: 12px;
      width: 60px;
      height: 60px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(249, 115, 22, 0.3);
      border-radius: 4px;
      overflow: hidden;
    }
    .minimap::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(249, 115, 22, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249, 115, 22, 0.05) 1px, transparent 1px);
      background-size: 10px 10px;
    }
    .minimap-dot {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(249, 115, 22, 0.8);
      border-radius: 50%;
      animation: minimapBlink 2s ease-in-out infinite;
    }
    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(249, 115, 22, 0.3), transparent);
      animation: scanLine 3s linear infinite;
      pointer-events: none;
    }
    .corner-bracket {
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: rgba(249, 115, 22, 0.4);
      border-style: solid;
      pointer-events: none;
    }
    .corner-bracket.tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
    .corner-bracket.tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
    .corner-bracket.bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; }
    .corner-bracket.br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }
    /* SparkLabs Animation Keyframes */
    @keyframes hudBarPulse {
      0%, 100% { width: 60%; }
      50% { width: 90%; }
    }
    @keyframes crosshairPulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
    }
    @keyframes minimapBlink {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    @keyframes scanLine {
      0% { top: 0; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }
  </style>
</head>
<body class="text-white min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SparkLabsHome = () => {
      const [scrollY, setScrollY] = useState(0);
      const [email, setEmail] = useState('');
      const [isSubmitted, setIsSubmitted] = useState(false);
      const heroRef = useRef(null);
      const gameWindowRef = useRef(null);

      useEffect(() => {
        const handleScroll = () => setScrollY(window.scrollY);
        window.addEventListener('scroll', handleScroll, { passive: true });
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      // Activate game HUD after a delay
      useEffect(() => {
        const timer = setTimeout(() => {
          const hud = document.getElementById('game-hud');
          if (hud) hud.classList.add('active');
        }, 2000);
        return () => clearTimeout(timer);
      }, []);

      const handleJoinWaitlist = (e) => {
        e.preventDefault();
        if (email) {
          setIsSubmitted(true);
          setTimeout(() => setIsSubmitted(false), 3000);
          setEmail('');
        }
      };

      const scrollToGameWindow = (e) => {
        e.preventDefault();
        gameWindowRef.current?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      };

      const coreFeatures = [
        {
          icon: 'fa-wand-magic-sparkles',
          title: 'AI-Native Content Generation',
          description: 'Transform imagination into game assets through neural synthesis. Characters, environments, and narratives emerge from natural language.'
        },
        {
          icon: 'fa-user-astronaut',
          title: 'AI Gameplay Generation',
          description: 'Every session adapts to the player. AI constructs dynamic mechanics, evolving challenges, and personalized progression paths in real-time.'
        },
        {
          icon: 'fa-video',
          title: 'Real-Time Generation',
          description: 'Neural rendering produces living worlds on demand. Every frame is synthesized instantly, creating infinite visual possibilities without asset constraints.'
        }
      ];

      const engineCapabilities = [
        {
          title: 'AI-Native Interaction',
          description: 'Natural language drives every interaction. Players communicate with worlds that understand context, emotion, and intent.',
          icon: 'fa-comments',
          stat: 'Natural'
        },
        {
          title: 'AI Agent System',
          description: 'Autonomous intelligent agents populate worlds with life. Each agent possesses memory, goals, and emergent behaviors.',
          icon: 'fa-robot',
          stat: 'Emergent'
        },
        {
          title: 'AI Open World Exploration',
          description: 'Infinite landscapes generated through world models. Every horizon reveals procedurally crafted environments shaped by player journey.',
          icon: 'fa-mountain-sun',
          stat: 'Infinite'
        },
        {
          title: 'World Model Architecture',
          description: 'Neural world models predict and simulate reality. Physics, causality, and narrative coherence emerge from learned patterns.',
          icon: 'fa-brain',
          stat: 'Coherent'
        }
      ];

      const testimonials = [
        {
          name: 'Sarah Chen',
          role: 'Indie Developer',
          quote: 'SparkLabs eliminated months of asset creation. I described my vision, and the AI built it in minutes.',
          company: 'Pixel Dreams Studio'
        },
        {
          name: 'Marcus Johnson',
          role: 'Technical Director',
          quote: 'We shipped across 5 platforms in record time. The engine-free approach changed how we think about game development.',
          company: 'Nebula Games'
        },
        {
          name: 'Emily Rodriguez',
          role: 'Creative Lead',
          quote: 'The procedural world builder lets me focus on storytelling while the AI handles technical complexity.',
          company: 'Chronicle Interactive'
        }
      ];

      return (
        <div className="min-h-screen bg-black text-white overflow-x-hidden">
          {/* Ambient Background */}
          <div className="fixed inset-0 z-0 pointer-events-none">
            <div
              className="absolute top-0 left-1/2 -translate-x-1/2 w-[2000px] h-[2000px] bg-gradient-to-b from-orange-900/10 via-transparent to-transparent rounded-full blur-3xl"
              style={{ transform: `translate(-50%, ${scrollY * 0.2}px)` }}
            />
            <div
              className="absolute bottom-0 right-0 w-[1500px] h-[1500px] bg-gradient-to-tl from-red-900/5 via-transparent to-transparent rounded-full blur-3xl"
              style={{ transform: `translate(30%, ${-scrollY * 0.15}px)` }}
            />
            <div className="absolute inset-0 grid-bg opacity-50" />
          </div>

          {/* Navigation */}
          <nav className="sticky top-0 z-50 bg-black/50 backdrop-blur-2xl border-b border-white/5">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="w-9 h-9 bg-gradient-to-br from-orange-500 to-red-600 rounded-full flex items-center justify-center">
                    <i className="fa-solid fa-fire text-white text-sm"></i>
                  </div>
                  <span className="text-xl font-bold tracking-tight">
                    <span className="gradient-text">Spark</span>
                    <span className="text-white">Labs</span>
                  </span>
                </div>
                <div className="hidden lg:flex items-center gap-8">
                  {[
                    { label: 'About', href: '#about' },
                    { label: 'Games', href: '#games' },
                    { label: 'Features', href: '#features' },
                    { label: 'Community', href: '#community' },
                    { label: 'Editor', href: 'editor.html' }
                  ].map((item) => (
                    <a key={item.label} href={item.href} className="text-white/40 hover:text-white transition-colors font-medium text-sm">
                      {item.label}
                    </a>
                  ))}
                </div>
                <div className="flex items-center gap-4">
                  <a href="#game-window" onClick={scrollToGameWindow} className="hidden sm:block text-white/40 hover:text-white transition-colors font-medium text-sm">
                    Sign In
                  </a>
                  <button className="px-5 py-2 bg-gradient-to-r from-orange-500 to-red-600 rounded-full font-semibold text-sm hover:from-orange-600 hover:to-red-700 transition-all">
                    Join Today
                  </button>
                </div>
              </div>
            </div>
          </nav>

          {/* Hero Section */}
          <section id="about" ref={heroRef} className="relative pt-20 pb-24 lg:pt-24 lg:pb-32 z-10">
            <div className="max-w-7xl mx-auto px-6">
              <div className="grid lg:grid-cols-2 gap-16 items-center">
                <div className="text-left">
                  <div className="inline-flex items-center gap-2 px-4 py-2 bg-white/5 border border-white/10 rounded-full mb-6 animate-slide-up">
                    <div className="w-2 h-2 bg-orange-500 rounded-full animate-pulse" />
                    <span className="text-orange-300 text-sm font-medium">AI Engine Now Available</span>
                  </div>

                  <h1 className="text-6xl lg:text-8xl font-black mb-4 leading-[0.95] tracking-tight animate-slide-up delay-100">
                    AI-Native
                    <br />
                    <span className="gradient-text text-glow">Game Engine</span>
                  </h1>

                  <p className="text-2xl lg:text-3xl font-bold text-white/60 mb-6 animate-slide-up delay-150">
                    Ignite Your Infinite Play
                  </p>

                  <p className="text-xl text-white/40 mb-10 max-w-lg leading-relaxed animate-slide-up delay-200">
                    SparkLabs transforms imagination into interactive experiences.
                    Describe your vision, and watch AI construct entire worlds in real-time.
                  </p>

                  <div className="flex flex-col sm:flex-row gap-4 mb-12 animate-slide-up delay-300">
                    <button className="px-8 py-4 bg-gradient-to-r from-orange-500 to-red-600 rounded-full font-bold text-lg hover:from-orange-600 hover:to-red-700 transition-all shadow-2xl shadow-orange-500/20 flex items-center justify-center gap-3">
                      <i className="fa-solid fa-rocket"></i>
                      Start Creating
                    </button>
                    <button className="px-8 py-4 bg-white/5 border border-white/10 rounded-full font-bold text-lg hover:bg-white/10 transition-all flex items-center justify-center gap-3">
                      <i className="fa-solid fa-play"></i>
                      Watch Demo
                    </button>
                  </div>

                  {/* Waitlist Form */}
                  <div className="animate-slide-up delay-400">
                    <p className="text-sm text-white/30 mb-3">Join the community of creators on the waitlist</p>
                    <form onSubmit={handleJoinWaitlist} className="flex gap-3 max-w-md">
                      <input
                        type="email"
                        value={email}
                        onChange={(e) => setEmail(e.target.value)}
                        placeholder="Enter your email"
                        className="flex-1 px-5 py-3 waitlist-input rounded-full text-sm text-white placeholder-white/30"
                      />
                      <button
                        type="submit"
                        className="px-6 py-3 bg-white/10 border border-white/20 rounded-full font-semibold text-sm hover:bg-white/20 transition-all whitespace-nowrap"
                      >
                        {isSubmitted ? 'Joined!' : 'Join Waitlist'}
                      </button>
                    </form>
                  </div>
                </div>

                {/* SparkLabs AI Game Visualization Window */}
                <div id="game-window" ref={gameWindowRef} className="relative animate-slide-up delay-300">
                  <div className="absolute -inset-8 bg-gradient-to-r from-orange-600/10 to-red-600/10 rounded-[3rem] blur-3xl animate-pulse-glow" />
                  <div className="relative glass-card rounded-[2rem] p-2 glow-orange">
                    <div className="bg-neutral-950 rounded-[1.5rem] overflow-hidden relative">
                      {/* Window Title Bar */}
                      <div className="flex items-center gap-3 px-5 py-4 border-b border-white/5">
                        <div className="flex gap-2">
                          <div className="w-3 h-3 rounded-full bg-red-500/60" />
                          <div className="w-3 h-3 rounded-full bg-yellow-500/60" />
                          <div className="w-3 h-3 rounded-full bg-green-500/60" />
                        </div>
                        <div className="flex-1 text-center text-xs text-white/20 font-mono">SparkLabs Neural Editor</div>
                        <div className="flex items-center gap-2 text-xs text-white/20">
                          <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse" />
                          Live
                        </div>
                      </div>

                      {/* SparkLabs AI Game Visualization Container */}
                      <div id="three-canvas-container" className="aspect-video bg-gradient-to-br from-neutral-900 to-black relative overflow-hidden" style={{minHeight: '300px'}}>
                        {/* CSS fallback: only shows when Three.js fails */}
                        <div id="three-fallback" className="absolute inset-0 flex items-center justify-center">
                          <div className="text-center">
                            <div className="w-16 h-16 mx-auto mb-4 rounded-full border-2 border-orange-500/30 animate-pulse flex items-center justify-center">
                              <i className="fa-solid fa-microchip text-orange-400 text-2xl"></i>
                            </div>
                            <p className="text-white/20 text-sm font-mono">SparkLabs Neural Core Active</p>
                          </div>
                        </div>

                        {/* SparkLabs Game HUD Overlay */}
                        <div className="game-window-overlay active" id="game-hud">
                          {/* Corner Brackets */}
                          <div className="corner-bracket tl"></div>
                          <div className="corner-bracket tr"></div>
                          <div className="corner-bracket bl"></div>
                          <div className="corner-bracket br"></div>

                          {/* Scan Line Effect */}
                          <div className="scan-line"></div>

                          {/* Top HUD */}
                          <div className="game-hud-top">
                            <div className="hud-panel">
                              <i className="fa-solid fa-crosshairs text-orange-400 mr-1"></i>
                              <span>AI Targeting Active</span>
                            </div>
                            <div className="hud-panel">
                              <span className="text-orange-400">NEURAL</span>
                              <span className="ml-1">v2.1.0</span>
                            </div>
                          </div>

                          {/* Crosshair */}
                          <div className="crosshair">
                            <div className="crosshair-dot"></div>
                          </div>

                          {/* Bottom HUD */}
                          <div className="game-hud-bottom">
                            <div className="hud-panel">
                              <div className="flex items-center gap-2">
                                <span>AI Power</span>
                                <div className="hud-bar">
                                  <div className="hud-bar-fill"></div>
                                </div>
                              </div>
                            </div>
                            <div className="hud-panel">
                              <i className="fa-solid fa-microchip text-orange-400 mr-1"></i>
                              <span>SparkLabs Core</span>
                            </div>
                          </div>

                          {/* Minimap */}
                          <div className="minimap">
                            <div className="minimap-dot" style={{top: '30%', left: '40%'}}></div>
                            <div className="minimap-dot" style={{top: '60%', left: '70%', animationDelay: '0.5s'}}></div>
                            <div className="minimap-dot" style={{top: '45%', left: '25%', animationDelay: '1s'}}></div>
                            <div className="minimap-dot" style={{top: '70%', left: '50%', animationDelay: '1.5s'}}></div>
                          </div>
                        </div>

                        <div className="absolute inset-0 flex items-center justify-center text-white/10 text-sm font-mono pointer-events-none z-10" id="canvas-loading" style={{display:'none'}}>
                          Initializing Neural Core...
                        </div>
                      </div>

                      {/* Bottom Status Bar */}
                      <div className="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black/80 to-transparent">
                        <div className="flex items-center justify-between">
                          <div className="flex items-center gap-3">
                            <div className="flex items-center gap-2 px-3 py-1.5 bg-white/5 rounded-full border border-white/10">
                              <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse" />
                              <span className="text-xs text-white/50 font-mono">AI Engine</span>
                            </div>
                            <div className="flex items-center gap-2 px-3 py-1.5 bg-white/5 rounded-full border border-white/10">
                              <i className="fa-solid fa-bolt text-orange-400 text-xs"></i>
                              <span className="text-xs text-white/50 font-mono">60 FPS</span>
                            </div>
                          </div>
                          <div className="flex gap-1">
                            <div className="w-6 h-1 bg-orange-500 rounded-full" />
                            <div className="w-4 h-1 bg-orange-500/60 rounded-full" />
                            <div className="w-3 h-1 bg-orange-500/30 rounded-full" />
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* Core Features - Three Column Layout */}
          <section id="games" className="py-24 relative z-10">
            <div className="max-w-7xl mx-auto px-6">
              <div className="text-center mb-20">
                <h2 className="text-4xl lg:text-5xl font-bold mb-4">AI-Native Game Creation</h2>
                <p className="text-xl text-white/30 max-w-2xl mx-auto">
                  Neural networks power every stage of game creation. From initial concept to fully playable worlds shaped by AI.
                </p>
              </div>

              <div className="grid lg:grid-cols-3 gap-8">
                {coreFeatures.map((feature, index) => (
                  <div key={index} className="feature-card rounded-3xl p-8 hover-lift">
                    <div className="w-14 h-14 bg-gradient-to-br from-orange-500/20 to-red-600/20 rounded-2xl flex items-center justify-center mb-6">
                      <i className={`fa-solid ${feature.icon} text-2xl text-orange-400`}></i>
                    </div>
                    <h3 className="text-2xl font-bold mb-4">{feature.title}</h3>
                    <p className="text-white/40 leading-relaxed">{feature.description}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* Neural Capabilities */}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SparkLabsHome />);

    // SparkLabs Neural Core Visualization Engine
    (function() {
      const container = document.getElementById('three-canvas-container');
      const fallbackEl = document.getElementById('three-fallback');
      if (!container || typeof THREE === 'undefined') {
        return;
      }

      function initVisualization() {
        const width = container.clientWidth || container.offsetWidth || 600;
        const height = container.clientHeight || container.offsetHeight || 340;
        if (width === 0 || height === 0) {
          setTimeout(initVisualization, 100);
          return;
        }

        // Hide CSS fallback when SparkLabs Neural Core renders successfully
        if (fallbackEl) fallbackEl.style.display = 'none';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(width, height);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0);
        renderer.domElement.style.display = 'block';
        renderer.domElement.style.width = '100%';
        renderer.domElement.style.height = '100%';
        renderer.domElement.style.position = 'absolute';
        renderer.domElement.style.top = '0';
        renderer.domElement.style.left = '0';
        renderer.domElement.style.zIndex = '5';
        container.appendChild(renderer.domElement);

        // SparkLabs Neural Network Nodes
        const nodeCount = 40;
        const nodes = [];
        const nodeGeometry = new THREE.SphereGeometry(0.08, 16, 16);
        const nodeColors = [0xf97316, 0xef4444, 0xfbbf24, 0xfb923c];

        for (let i = 0; i < nodeCount; i++) {
          const material = new THREE.MeshBasicMaterial({
            color: nodeColors[Math.floor(Math.random() * nodeColors.length)],
            transparent: true,
            opacity: 0.6 + Math.random() * 0.4
          });
          const node = new THREE.Mesh(nodeGeometry, material);
          node.position.set(
            (Math.random() - 0.5) * 8,
            (Math.random() - 0.5) * 5,
            (Math.random() - 0.5) * 4
          );
          node.userData = {
            velocity: new THREE.Vector3(
              (Math.random() - 0.5) * 0.01,
              (Math.random() - 0.5) * 0.01,
              (Math.random() - 0.5) * 0.01
            ),
            pulsePhase: Math.random() * Math.PI * 2,
            pulseSpeed: 0.5 + Math.random() * 1.5
          };
          scene.add(node);
          nodes.push(node);
        }

        // SparkLabs Neural Connection Lines
        const lineMaterial = new THREE.LineBasicMaterial({
          color: 0xf97316,
          transparent: true,
          opacity: 0.15
        });
        const connections = [];

        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const dist = nodes[i].position.distanceTo(nodes[j].position);
            if (dist < 2.5) {
              const geometry = new THREE.BufferGeometry().setFromPoints([nodes[i].position, nodes[j].position]);
              const line = new THREE.Line(geometry, lineMaterial.clone());
              line.userData = { nodeA: i, nodeB: j, baseOpacity: 0.15 };
              scene.add(line);
              connections.push(line);
            }
          }
        }

        // SparkLabs Data Flow Particle System
        const particleCount = 100;
        const particleGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const velocities = [];

        for (let i = 0; i < particleCount; i++) {
          positions[i * 3] = (Math.random() - 0.5) * 10;
          positions[i * 3 + 1] = (Math.random() - 0.5) * 6;
          positions[i * 3 + 2] = (Math.random() - 0.5) * 5;
          velocities.push({
            x: (Math.random() - 0.5) * 0.02,
            y: (Math.random() - 0.5) * 0.02,
            z: (Math.random() - 0.5) * 0.02
          });
        }

        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMaterial = new THREE.PointsMaterial({
          color: 0xfbbf24,
          size: 0.05,
          transparent: true,
          opacity: 0.6,
          blending: THREE.AdditiveBlending
        });
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);

        // SparkLabs Central AI Core
        const coreGeometry = new THREE.IcosahedronGeometry(0.4, 2);
        const coreMaterial = new THREE.MeshBasicMaterial({
          color: 0xf97316,
          wireframe: true,
          transparent: true,
          opacity: 0.8
        });
        const core = new THREE.Mesh(coreGeometry, coreMaterial);
        scene.add(core);

        // SparkLabs Core Glow Effect
        const glowGeometry = new THREE.SphereGeometry(0.6, 32, 32);
        const glowMaterial = new THREE.MeshBasicMaterial({
          color: 0xf97316,
          transparent: true,
          opacity: 0.1
        });
        const glow = new THREE.Mesh(glowGeometry, glowMaterial);
        scene.add(glow);

        // SparkLabs Floating World Fragments
        const fragmentGeometry = new THREE.BoxGeometry(0.3, 0.3, 0.3);
        const fragments = [];
        for (let i = 0; i < 8; i++) {
          const mat = new THREE.MeshBasicMaterial({
            color: nodeColors[Math.floor(Math.random() * nodeColors.length)],
            transparent: true,
            opacity: 0.3,
            wireframe: true
          });
          const fragment = new THREE.Mesh(fragmentGeometry, mat);
          fragment.position.set(
            (Math.random() - 0.5) * 6,
            (Math.random() - 0.5) * 4,
            (Math.random() - 0.5) * 3
          );
          fragment.userData = {
            rotationSpeed: {
              x: (Math.random() - 0.5) * 0.02,
              y: (Math.random() - 0.5) * 0.02,
              z: (Math.random() - 0.5) * 0.02
            },
            floatSpeed: 0.005 + Math.random() * 0.01,
            floatPhase: Math.random() * Math.PI * 2
          };
          scene.add(fragment);
          fragments.push(fragment);
        }

        camera.position.z = 5;

        // Mouse interaction for SparkLabs Neural Core
        let mouseX = 0, mouseY = 0;
        container.addEventListener('mousemove', (e) => {
          const rect = container.getBoundingClientRect();
          mouseX = ((e.clientX - rect.left) / rect.width - 0.5) * 2;
          mouseY = ((e.clientY - rect.top) / rect.height - 0.5) * 2;
        });

        // SparkLabs Neural Core Animation Loop
        let time = 0;
        function animate() {
          requestAnimationFrame(animate);
          time += 0.016;

          // Rotate SparkLabs AI Core
          core.rotation.x += 0.01;
          core.rotation.y += 0.015;
          glow.scale.setScalar(1 + Math.sin(time * 2) * 0.2);
          glowMaterial.opacity = 0.1 + Math.sin(time * 2) * 0.05;

          // Animate SparkLabs Neural Nodes
          nodes.forEach((node) => {
            const data = node.userData;
            node.position.add(data.velocity);
            node.position.y += Math.sin(time * data.pulseSpeed + data.pulsePhase) * 0.002;

            // Boundary check for SparkLabs Neural Network
            if (Math.abs(node.position.x) > 4) data.velocity.x *= -1;
            if (Math.abs(node.position.y) > 3) data.velocity.y *= -1;
            if (Math.abs(node.position.z) > 2) data.velocity.z *= -1;

            // Pulse scale for SparkLabs Nodes
            const scale = 1 + Math.sin(time * data.pulseSpeed + data.pulsePhase) * 0.3;
            node.scale.setScalar(scale);
          });

          // Update SparkLabs Neural Connections
          connections.forEach(line => {
            const nodeA = nodes[line.userData.nodeA];
            const nodeB = nodes[line.userData.nodeB];
            const posArr = line.geometry.attributes.position.array;
            posArr[0] = nodeA.position.x;
            posArr[1] = nodeA.position.y;
            posArr[2] = nodeA.position.z;
            posArr[3] = nodeB.position.x;
            posArr[4] = nodeB.position.y;
            posArr[5] = nodeB.position.z;
            line.geometry.attributes.position.needsUpdate = true;

            // Dynamic opacity based on distance for SparkLabs Connections
            const dist = nodeA.position.distanceTo(nodeB.position);
            line.material.opacity = Math.max(0, 0.3 - dist * 0.1) * (0.5 + Math.sin(time * 2) * 0.5);
          });

          // Animate SparkLabs Data Particles
          const posArray = particles.geometry.attributes.position.array;
          for (let i = 0; i < particleCount; i++) {
            posArray[i * 3] += velocities[i].x;
            posArray[i * 3 + 1] += velocities[i].y;
            posArray[i * 3 + 2] += velocities[i].z;

            // Reset particles that go too far in SparkLabs Engine
            if (Math.abs(posArray[i * 3]) > 5) velocities[i].x *= -1;
            if (Math.abs(posArray[i * 3 + 1]) > 3) velocities[i].y *= -1;
            if (Math.abs(posArray[i * 3 + 2]) > 2.5) velocities[i].z *= -1;
          }
          particles.geometry.attributes.position.needsUpdate = true;

          // Animate SparkLabs World Fragments
          fragments.forEach(fragment => {
            fragment.rotation.x += fragment.userData.rotationSpeed.x;
            fragment.rotation.y += fragment.userData.rotationSpeed.y;
            fragment.rotation.z += fragment.userData.rotationSpeed.z;
            fragment.position.y += Math.sin(time * fragment.userData.floatSpeed + fragment.userData.floatPhase) * 0.003;
          });

          // Camera parallax for SparkLabs Neural View
          camera.position.x += (mouseX * 0.5 - camera.position.x) * 0.05;
          camera.position.y += (-mouseY * 0.3 - camera.position.y) * 0.05;
          camera.lookAt(0, 0, 0);

          renderer.render(scene, camera);
        }

        animate();

        // Handle resize for SparkLabs Neural Core
        const resizeObserver = new ResizeObserver(() => {
          const w = container.clientWidth;
          const h = container.clientHeight;
          if (w > 0 && h > 0) {
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
          }
        });
        resizeObserver.observe(container);
      }

      // Delay initialization to ensure React has rendered and container has size
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => setTimeout(initVisualization, 500));
      } else {
        setTimeout(initVisualization, 500);
      }
    })();
  </script>
